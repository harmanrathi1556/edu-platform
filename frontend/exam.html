<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Proctored Exam | EDU-AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; }
        .exam-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .timer-glow { text-shadow: 0 0 10px #3b82f6; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold">JEE Practice Test #1</h1>
                <p class="text-blue-400 font-mono timer-glow" id="timer">Time Left: 59:59</p>
            </div>
            <div class="text-right">
                <div class="inline-flex items-center gap-2 bg-red-500/10 border border-red-500/20 px-4 py-2 rounded-full">
                    <span class="w-2 h-2 bg-red-500 rounded-full animate-ping"></span>
                    <span class="text-xs font-bold text-red-500">AI PROCTORING ACTIVE</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="md:col-span-2 space-y-6">
                <div class="exam-card p-8 rounded-3xl">
                    <p class="text-gray-400 mb-4">Question 1 of 30</p>
                    <h2 class="text-xl font-medium mb-8">A car travels 200km at a speed of 50km/h. How much time does it take?</h2>
                    
                    <div class="space-y-4">
                        <label class="flex items-center gap-4 p-4 rounded-xl border border-white/5 hover:bg-white/5 cursor-pointer transition">
                            <input type="radio" name="q1" value="1" class="w-5 h-5 accent-blue-600">
                            <span>2 Hours</span>
                        </label>
                        <label class="flex items-center gap-4 p-4 rounded-xl border border-white/5 hover:bg-white/5 cursor-pointer transition">
                            <input type="radio" name="q1" value="2" class="w-5 h-5 accent-blue-600">
                            <span>4 Hours</span>
                        </label>
                    </div>
                </div>
                <button class="w-full bg-blue-600 py-4 rounded-2xl font-bold hover:bg-blue-700 transition">Next Question</button>
            </div>

            <div class="space-y-6">
                <div class="exam-card p-4 rounded-2xl border-red-500/10">
                    <p class="text-xs font-bold text-gray-500 mb-2 uppercase">AI Vision Feed</p>
                    <div class="aspect-video bg-black rounded-xl flex items-center justify-center border border-white/10">
                        <span class="text-[10px] text-gray-600">Camera Active...</span>
                    </div>
                </div>
                
                <div class="exam-card p-6 rounded-2xl">
                    <h3 class="font-bold mb-4">Warning Log</h3>
                    <ul id="warningLog" class="text-xs space-y-2 text-gray-400">
                        <li>✅ Environment Secure</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://edu-platform-sqty.onrender.com";
        const TOKEN = localStorage.getItem("token");

        // FEATURE #10: TAB SWITCH DETECTION
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                logCheatingEvent("TAB_SWITCH");
            }
        });

        async function logCheatingEvent(type) {
            const logItem = document.createElement('li');
            logItem.className = "text-red-400";
            logItem.innerText = `⚠️ ${type} detected at ${new_timestamp()}`;
            document.getElementById('warningLog').prepend(logItem);

            // Send to Backend for Feature #10 Flagging
            await fetch(`${BACKEND_URL}/exams/log-proctor-event`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${TOKEN}` },
                body: JSON.stringify({ 
                    exam_id: "test_001", 
                    event_type: type 
                })
            });
        }

        function new_timestamp() { return new Date().toLocaleTimeString(); }
    </script>
</body>
</html>
