<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edu-AI | Smart Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .stat-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .stat-card:hover { border-color: rgba(59, 130, 246, 0.5); background: rgba(59, 130, 246, 0.05); }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-black/50 border-r border-white/5 p-6 flex flex-col">
        <div class="text-2xl font-bold mb-10 text-blue-500">EDU-AI</div>
        <nav class="space-y-2 flex-1">
            <div onclick="location.reload()" class="p-3 bg-blue-600 rounded-lg cursor-pointer">Overview</div>
            <div onclick="showSection('institutes')" class="p-3 hover:bg-white/5 rounded-lg cursor-pointer">Institutes</div>
            <div onclick="showSection('batches')" class="p-3 hover:bg-white/5 rounded-lg cursor-pointer">Batches</div>
            <div onclick="showPayment()" class="p-3 text-yellow-500 font-bold cursor-pointer">💳 Pay / Buy</div>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <div id="overview-section">
            <h1 class="text-3xl font-bold mb-8">Welcome, <span id="userNameDisplay">User</span></h1>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="stat-card p-6 rounded-2xl">
                    <p class="text-gray-400">Total Users</p>
                    <p id="totalUsers" class="text-3xl font-bold">0</p>
                </div>
                <div class="stat-card p-6 rounded-2xl">
                    <p class="text-gray-400">Revenue</p>
                    <p id="totalRevenue" class="text-3xl font-bold text-green-400">₹0</p>
                </div>
                <div class="stat-card p-6 rounded-2xl">
                    <p class="text-gray-400">Your XP</p>
                    <p id="userXP" class="text-3xl font-bold text-yellow-500">0</p>
                </div>
            </div>

            <div class="glass p-8 rounded-3xl">
                <h2 class="text-2xl font-bold mb-4">🤖 AI Doubt Solver</h2>
                <div class="flex flex-col gap-4">
                    <textarea id="aiQuestion" placeholder="Type your doubt here..." class="w-full bg-white/5 p-4 rounded-xl border border-white/10 h-32"></textarea>
                    
                    <div class="flex items-center gap-4">
                        <label class="cursor-pointer bg-white/10 px-4 py-2 rounded-lg hover:bg-white/20">
                            📷 Add Image
                            <input type="file" id="aiImage" class="hidden" onchange="alert('Image attached!')">
                        </label>
                        <button onclick="askAI()" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold hover:bg-blue-700">Solve with AI</button>
                    </div>
                </div>
                <div id="aiResponse" class="mt-6 p-6 bg-blue-500/10 rounded-2xl hidden border border-blue-500/20"></div>
            </div>
        </div>
    </main>

    <div id="paymentModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-50">
        <div class="glass p-8 rounded-3xl w-full max-w-md relative">
            <button onclick="hidePayment()" class="absolute top-4 right-4 text-2xl">✕</button>
            <h2 class="text-2xl font-bold mb-4">Payment Portal</h2>
            
            <div class="border-2 border-dashed border-white/20 rounded-2xl p-4 mb-6 text-center">
                <p class="text-xs text-gray-400 mb-2 font-bold">YOUR QR CODE GOES HERE</p>
                <img id="myQR" src="https://via.placeholder.com/200?text=Upload+Your+QR+to+GitHub" class="w-40 h-40 mx-auto rounded-lg">
            </div>

            <input id="payAmount" type="number" placeholder="Amount" class="w-full bg-white/5 p-4 rounded-xl mb-4">
            <input id="qrUrl" type="text" placeholder="Paste Screenshot Link" class="w-full bg-white/5 p-4 rounded-xl mb-6">
            <button onclick="submitPayment()" class="w-full bg-blue-600 py-4 rounded-xl font-bold">Submit Payment</button>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
