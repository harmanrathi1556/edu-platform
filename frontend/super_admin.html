<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>God Mode | Harman Rathi Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050508; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-approve { background: #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
        .btn-reject { background: #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
        .user-row:hover { background: rgba(255,255,255,0.03); transform: translateX(5px); transition: 0.3s; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-72 border-r border-white/5 p-8 flex flex-col h-screen sticky top-0">
        <div class="text-3xl font-black mb-12 text-blue-500">GOD<span class="text-white">MODE</span></div>
        <nav class="space-y-4 flex-1">
            <div onclick="loadUsers()" class="p-4 bg-blue-600/10 text-blue-400 rounded-2xl cursor-pointer font-bold">👥 User Management</div>
            <div onclick="alert('Institutes System Live')" class="p-4 hover:bg-white/5 rounded-2xl cursor-pointer text-gray-500">🏫 Manage Institutes</div>
            <div onclick="alert('Revenue System Live')" class="p-4 hover:bg-white/5 rounded-2xl cursor-pointer text-gray-500">💰 Global Revenue</div>
        </nav>
        <div class="mt-auto p-4 glass rounded-2xl border-blue-500/20">
            <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Active Admin</p>
            <p class="text-sm font-bold">Harman Rathi</p>
        </div>
    </aside>

    <main class="flex-1 p-12">
        <header class="flex justify-between items-center mb-12">
            <h1 class="text-4xl font-black">User <span class="text-blue-500">Approval Center</span></h1>
            <div class="glass px-6 py-2 rounded-full border-blue-500/30 text-blue-400 font-bold text-sm">
                System Online ●
            </div>
        </header>

        <div class="glass rounded-[2.5rem] overflow-hidden border-white/5">
            <table class="w-full text-left">
                <thead class="bg-white/5 text-[10px] uppercase font-black tracking-widest text-gray-400">
                    <tr>
                        <th class="p-6">Name & Email</th>
                        <th class="p-6">Role</th>
                        <th class="p-6">Status</th>
                        <th class="p-6">Actions</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr><td colspan="4" class="p-20 text-center text-gray-500 italic">Connecting to Neural Core...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const BACKEND_URL = "https://edu-platform-sqty.onrender.com";
        const TOKEN = localStorage.getItem("token");

        // FEATURE #21: LOAD ALL USERS
        async function loadUsers() {
            const res = await fetch(`${BACKEND_URL}/admin/manage-users`, {
                headers: { "Authorization": `Bearer ${TOKEN}` }
            });
            const users = await res.json();
            const body = document.getElementById('userTableBody');
            body.innerHTML = "";

            users.forEach(user => {
                const isApproved = user.is_approved;
                body.innerHTML += `
                    <tr class="user-row border-b border-white/5 transition-all">
                        <td class="p-6">
                            <p class="font-bold text-white">${user.full_name}</p>
                            <p class="text-xs text-gray-500">${user.email}</p>
                        </td>
                        <td class="p-6">
                            <select onchange="updateRole('${user.id}', this.value)" class="bg-transparent border border-white/10 text-xs rounded-lg p-1 outline-none">
                                <option value="student" ${user.role === 'student' ? 'selected' : ''}>Student</option>
                                <option value="teacher" ${user.role === 'teacher' ? 'selected' : ''}>Teacher</option>
                                <option value="inst_admin" ${user.role === 'inst_admin' ? 'selected' : ''}>Inst Admin</option>
                            </select>
                        </td>
                        <td class="p-6">
                            <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${isApproved ? 'bg-green-500/10 text-green-500' : 'bg-yellow-500/10 text-yellow-500'}">
                                ${isApproved ? 'Approved' : 'Pending'}
                            </span>
                        </td>
                        <td class="p-6 flex gap-2">
                            ${!isApproved ? `<button onclick="approveUser('${user.id}')" class="btn-approve px-4 py-2 rounded-xl text-xs font-bold">Approve</button>` : ''}
                            <button onclick="rejectUser('${user.id}')" class="btn-reject px-4 py-2 rounded-xl text-xs font-bold">Remove</button>
                        </td>
                    </tr>
                `;
            });
        }

        // FEATURE #18: APPROVAL LOGIC
        async function approveUser(id) {
            await fetch(`${BACKEND_URL}/admin/approve-user`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${TOKEN}` },
                body: JSON.stringify({ user_id: id, approve: true })
            });
            loadUsers();
        }

        // FEATURE #21: ROLE REASSIGNMENT
        async function updateRole(id, role) {
            if(role === 'super_admin') return alert("Only Harman Rathi can hold the God Mode role.");
            const res = await fetch(`${BACKEND_URL}/admin/update-role`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${TOKEN}` },
                body: JSON.stringify({ user_id: id, role: role })
            });
            if(res.ok) alert("Role Updated Successfully!");
            loadUsers();
        }

        window.onload = loadUsers;
    </script>
</body>
</html>
