<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu-AI | Smart Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top, #1a1a2e, #0a0a0a); color: white; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow { text-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .float { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">
    <nav class="fixed top-0 w-full p-6 flex justify-between items-center max-w-6xl">
        <div class="text-2xl font-bold glow">EDU<span class="text-blue-500">AI</span></div>
        <div class="space-x-6 hidden md:block">
            <a href="#" class="hover:text-blue-400 transition">Features</a>
            <a href="#" class="hover:text-blue-400 transition">Institutes</a>
            <button onclick="showLogin()" class="bg-blue-600 px-6 py-2 rounded-full font-semibold hover:bg-blue-700 transition">Login</button>
        </div>
    </nav>

    <main class="text-center mt-20 float">
        <h1 class="text-6xl md:text-8xl font-black mb-6 tracking-tighter">
            FUTURE OF <br> <span class="text-blue-500">EDUCATION</span>
        </h1>
        <p class="text-gray-400 text-lg md:text-xl max-w-2xl mx-auto mb-10">
            Fully automated AI-powered platform for institutes. Real-time proctoring, 
            instant doubt solving, and addictive gamification.
        </p>
        <div class="flex flex-col md:flex-row gap-4 justify-center">
            <button class="bg-blue-600 px-10 py-4 rounded-xl font-bold text-lg hover:scale-105 transition">Create Institute</button>
            <button class="glass px-10 py-4 rounded-xl font-bold text-lg hover:bg-white/10 transition">Student Portal</button>
        </div>
    </main>

    <div id="loginModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="glass p-8 rounded-3xl w-full max-w-md relative">
            <button onclick="hideLogin()" class="absolute top-4 right-4 text-gray-400 hover:text-white">✕</button>
            <h2 class="text-3xl font-bold mb-6 text-center">Welcome Back</h2>
            
            <input id="email" type="email" placeholder="Email" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4 focus:outline-none focus:border-blue-500 text-white">
            
            <input id="password" type="password" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-6 focus:outline-none focus:border-blue-500 text-white">
            
            <button id="authBtn" onclick="handleAuth()" class="w-full bg-blue-600 py-4 rounded-xl font-bold hover:bg-blue-700 transition">Sign In</button>
        </div>
    </div>

   <script>
        const BACKEND_URL = "https://edu-platform-sqty.onrender.com";

        function showLogin() { 
            document.getElementById('loginModal').classList.remove('hidden'); 
        }
        function hideLogin() { 
            document.getElementById('loginModal').classList.add('hidden'); 
        }

        async function handleAuth() {
            // These lines now work because the IDs exist above
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('authBtn');
            
            if(!email || !password) {
                alert("Please fill in all fields");
                return;
            }

            btn.innerText = "Processing...";
            
            try {
                const response = await fetch(`${BACKEND_URL}/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        email: email, 
                        password: password, 
                        full_name: "New User" 
                    })
                });
                
                const data = await response.json();
                
                if (response.status === 201) {
                    alert("Success! Your account is created. Please wait for Admin (You) to approve it.");
                    hideLogin();
                } else {
                    alert("Error: " + data.error);
                }
            } catch (err) {
                console.error(err);
                alert("Server is starting up. Please wait 30 seconds and try again.");
            } finally {
                btn.innerText = "Sign In";
            }
        }
    </script>
</body>
</html>

</body>
</html>
