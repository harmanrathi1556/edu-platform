<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu-AI | The Future of Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top, #1a1a2e, #050505); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glow-btn { transition: 0.3s; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        .glow-btn:hover { box-shadow: 0 0 40px rgba(59, 130, 246, 0.5); transform: translateY(-2px); }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6">

    <nav class="fixed top-0 w-full p-8 flex justify-between items-center max-w-7xl">
        <div class="text-3xl font-black tracking-tighter text-blue-500">EDU<span class="text-white">AI</span></div>
        <button onclick="openAuth()" class="glass px-8 py-3 rounded-full font-bold hover:bg-white/5 transition">Portal Login</button>
    </nav>

    <main class="text-center max-w-4xl mt-20">
        <h1 class="text-7xl md:text-9xl font-black mb-8 tracking-tighter leading-none">
            UNLEASH <br> <span class="text-blue-500 text-glow">INTELLIGENCE</span>
        </h1>
        <p class="text-gray-400 text-xl md:text-2xl mb-12 leading-relaxed">
            The world's first fully automated AI Education Engine. <br>
            Multi-role dashboards, Proctored Exams, and Gamified Growth.
        </p>
        <div class="flex flex-wrap gap-6 justify-center">
            <button onclick="openAuth()" class="bg-blue-600 px-12 py-5 rounded-2xl font-black text-xl glow-btn">Launch Platform</button>
            <button class="glass px-12 py-5 rounded-2xl font-black text-xl hover:bg-white/10 transition">Explore Features</button>
        </div>
    </main>

    <div id="authModal" class="fixed inset-0 bg-black/90 backdrop-blur-xl hidden flex items-center justify-center z-50 p-4">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-md relative border-white/10">
            <button onclick="closeAuth()" class="absolute top-6 right-6 text-gray-500 hover:text-white text-2xl">✕</button>
            
            <div class="text-center mb-8">
                <h2 class="text-3xl font-black mb-2">Welcome Back</h2>
                <p class="text-gray-500 text-sm">Enter your credentials to access your dashboard</p>
            </div>

            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-black text-blue-500 ml-2">Email Address</label>
                    <input id="email" type="email" placeholder="name@institute.com" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-blue-500 outline-none transition">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-black text-blue-500 ml-2">Secret Password</label>
                    <input id="password" type="password" placeholder="••••••••" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-blue-500 outline-none transition">
                </div>
                
                <button id="authBtn" onclick="handleUniversalLogin()" class="w-full bg-blue-600 py-5 rounded-2xl font-black text-lg mt-4 glow-btn">Sign Into Portal</button>
                
                <p class="text-center text-[10px] text-gray-600 mt-6 uppercase tracking-widest">Secure AES-256 Encryption Active</p>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://edu-platform-sqty.onrender.com";

        function openAuth() { document.getElementById('authModal').classList.remove('hidden'); }
        function closeAuth() { document.getElementById('authModal').classList.add('hidden'); }

        async function handleUniversalLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('authBtn');

            if(!email || !password) return alert("Please enter credentials");

            btn.innerText = "AUTHENTICATING...";
            btn.disabled = true;

            try {
                // We use the same /register route but the backend logic identifies existing users
                const res = await fetch(`${BACKEND_URL}/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem("token", data.token);
                    localStorage.setItem("userRole", data.role);
                    localStorage.setItem("userName", data.full_name || "User");

                    // 🚀 THE SMART REDIRECT ENGINE
                    const role = data.role;
                    if (role === 'super_admin') {
                        window.location.href = "super_admin.html";
                    } else if (role === 'inst_admin') {
                        window.location.href = "inst_admin.html";
                    } else if (role === 'teacher') {
                        window.location.href = "teacher.html";
                    } else {
                        window.location.href = "student_dashboard.html";
                    }
                } else {
                    alert("Access Denied: " + data.error);
                }
            } catch (err) {
                alert("Server connection failed. Retrying...");
            } finally {
                btn.innerText = "Sign Into Portal";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
