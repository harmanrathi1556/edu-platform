{% extends "base.html" %}

{% block title %}Register - Harman Rathi Portal{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="glass max-w-md w-full p-10 rounded-3xl glow-purple">
        <div class="text-center mb-10">
            <div class="w-24 h-24 bg-gradient-to-r from-purple-500 to-pink-600 rounded-3xl mx-auto mb-6 flex items-center justify-center glow-purple">
                <i class="fas fa-user-plus text-3xl"></i>
            </div>
            <h1 class="orbitron text-4xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent mb-2">
                Join Us
            </h1>
            <p class="opacity-75">Create your account</p>
        </div>

        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-3 text-white/90">Full Name</label>
                <input type="text" name="full_name" required 
                       class="w-full glass px-5 py-4 rounded-2xl focus:ring-4 focus:ring-purple-500/50 transition-all duration-300" 
                       placeholder="John Doe">
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-3 text-white/90">Email</label>
                <input type="email" name="email" required 
                       class="w-full glass px-5 py-4 rounded-2xl focus:ring-4 focus:ring-purple-500/50 transition-all duration-300" 
                       placeholder="student@school.com">
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-3 text-white/90">Password</label>
                <input type="password" name="password" required minlength="6"
                       class="w-full glass px-5 py-4 rounded-2xl focus:ring-4 focus:ring-purple-500/50 transition-all duration-300" 
                       placeholder="••••••••">
            </div>
            
            <button type="submit" 
                    class="w-full bg-gradient-to-r from-purple-500 to-pink-600 hover:from-purple-600 hover:to-pink-700 text-white font-bold py-4 px-6 rounded-2xl glow-purple transform hover:scale-[1.02] transition-all duration-300">
                <i class="fas fa-user-plus mr-2"></i>
                Create Account
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-sm opacity-75">
                Already have account? 
                <a href="{{ url_for('auth.login') }}" class="text-purple-400 hover:text-purple-300 font-semibold">Sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
