{% extends "base.html" %}

{% block title %}Login - Harman Rathi Portal 🚀{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="glass max-w-md w-full p-10 rounded-3xl glow-blue shadow-2xl">
        <div class="text-center mb-10">
            <div class="w-24 h-24 bg-gradient-to-r from-blue-500 to-purple-600 rounded-3xl mx-auto mb-6 flex items-center justify-center glow-blue">
                <i class="fas fa-rocket text-3xl"></i>
            </div>
            <h1 class="orbitron text-4xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent mb-2">
                Sign In
            </h1>
            <p class="opacity-75">Access your Harman Rathi Portal</p>
        </div>

        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-3 text-white/90">Email Address</label>
                <input type="email" name="email" required 
                       class="w-full glass px-5 py-4 rounded-2xl border-0 focus:ring-4 focus:ring-blue-500/50 focus:outline-none transition-all duration-300 text-white placeholder-white/50" 
                       placeholder="your@email.com"
                       value="superadmin@harmanrathi.com">
            </div>
            
            <div class="relative">
                <label class="block text-sm font-medium mb-3 text-white/90">Password</label>
                <input type="password" name="password" required 
                       class="w-full glass px-5 py-4 rounded-2xl border-0 focus:ring-4 focus:ring-blue-500/50 focus:outline-none transition-all duration-300 text-white placeholder-white/50 pr-12" 
                       placeholder="••••••••">
                <i class="fas fa-eye absolute right-4 top-14 text-white/50 hover:text-white cursor-pointer"></i>
            </div>
            
            <button type="submit" 
                    class="w-full bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white font-bold py-4 px-6 rounded-2xl glow-blue transform hover:scale-[1.02] hover:shadow-2xl transition-all duration-300 text-lg">
                <i class="fas fa-sign-in-alt mr-2"></i>
                Enter Portal
            </button>
        </form>

        <div class="mt-10 pt-8 border-t border-white/10 text-center">
            <p class="text-sm opacity-75 mb-4">
                Don't have an account? 
                <a href="{{ url_for('auth.register') }}" class="text-blue-400 hover:text-blue-300 font-semibold">Create one</a>
            </p>
            <p class="text-xs opacity-50">Secure • Fast • AI-Powered © 2024</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Auto-focus email
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelector('input[name="email"]').focus();
    });
</script>
{% endblock %}
