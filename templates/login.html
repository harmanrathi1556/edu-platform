{% extends "base.html" %}

{% block title %}Login - Harman Rathi Portal{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="glass max-w-md w-full p-10 rounded-3xl glow-blue">
        <div class="text-center mb-10">
            <i class="fas fa-rocket text-6xl text-blue-400 mb-4"></i>
            <h1 class="orbitron text-4xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent mb-2">
                Welcome Back
            </h1>
            <p class="opacity-75">Sign in to your account</p>
        </div>

        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2">Email</label>
                <input type="email" name="email" required 
                       class="w-full glass px-4 py-3 rounded-xl border-0 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all duration-300" 
                       placeholder="superadmin@harmanrathi.com">
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-2">Password</label>
                <input type="password" name="password" required 
                       class="w-full glass px-4 py-3 rounded-xl border-0 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all duration-300" 
                       placeholder="superadmin123">
            </div>
            
            <button type="submit" 
                    class="w-full bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 px-6 py-4 rounded-2xl font-bold text-lg glow-blue transform hover:scale-105 transition-all duration-300">
                <i class="fas fa-sign-in-alt mr-2"></i>
                Sign In
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="opacity-75">Don't have an account? 
                <a href="{{ url_for('auth.register') }}" class="text-blue-400 hover:text-blue-300 font-bold">Register here</a>
            </p>
            <p class="mt-2 text-xs opacity-50">
                👑 Superadmin: superadmin@harmanrathi.com / superadmin123
            </p>
        </div>
    </div>
</div>
{% endblock %}
