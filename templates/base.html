<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Harman Rathi Portal</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
            overflow-x: hidden;
        }

        /* Glass effect */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Glow effect */
        .glow {
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }

        /* Floating animation */
        .float {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="flex justify-between items-center p-4 glass">
        <h1 class="text-2xl font-bold text-cyan-400">⚡ Harman Portal</h1>
        <div>
            <a href="/login" class="mr-4 hover:text-cyan-300">Login</a>
            <a href="/register" class="hover:text-cyan-300">Register</a>
        </div>
    </nav>

    <!-- Content -->
    <div class="p-6">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
