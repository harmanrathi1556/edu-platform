<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>⚡ Harman Portal</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,255,255,0.1);
        }
    </style>
</head>

<body>

<!-- 🔝 NAVBAR -->
<nav class="glass p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-cyan-400">⚡ Harman Portal</h1>

    <div>
        <a href="/" class="mx-2 hover:text-cyan-300">Home</a>

        {% if session.get("user") %}
            <a href="/dashboard" class="mx-2 hover:text-cyan-300">Dashboard</a>
            <a href="/logout" class="mx-2 text-red-400">Logout</a>
        {% else %}
            <a href="/login" class="mx-2 hover:text-cyan-300">Login</a>
            <a href="/register" class="mx-2 hover:text-cyan-300">Register</a>
        {% endif %}
    </div>
</nav>

<!-- ⚡ FLASH MESSAGES -->
<div class="p-4">
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="bg-green-600 p-2 rounded mb-2">
                    {{ msg }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
</div>

<!-- 📦 MAIN CONTENT -->
<div class="p-6">
    {% block content %}{% endblock %}
</div>

<!-- 🤖 GLOBAL AI ASSISTANT -->
<div style="position:fixed;bottom:20px;right:20px;width:320px;background:#0f172a;padding:15px;border-radius:10px;box-shadow:0 0 20px rgba(0,255,255,0.3);z-index:9999;">

    <h3 style="color:#38bdf8;font-weight:bold;">🤖 AI Assistant</h3>

    <textarea id="global-question"
        style="width:100%;padding:8px;background:black;color:white;border-radius:5px;margin-top:5px;"
        placeholder="Ask anything..."></textarea>

    <button onclick="askGlobalAI()"
        style="margin-top:10px;background:#2563eb;padding:8px 12px;border:none;border-radius:5px;color:white;width:100%;">
        Ask AI
    </button>

    <div id="global-answer" style="margin-top:10px;color:#4ade80;font-size:14px;"></div>
</div>

<!-- 📜 JS FILE -->
<script src="/static/js/main.js"></script>

</body>
</html>
